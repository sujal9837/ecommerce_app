# --- Database (Render env vars, with local H2 fallback) ---
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce
spring.datasource.username=root
spring.datasource.password=8520

# --- JPA ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


# --- JWT ---
# Use JWT_SECRET env var if present, otherwise fall back to a local dev default (>= 32 chars)
jwt.secret=${JWT_SECRET:dev-jwt-secret-change-me-dev-jwt-secret-change-me}

# --- Server ---
server.port=8080

# --- H2 (local fallback visibility) ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

